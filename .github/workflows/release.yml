name: Release CLI Binaries

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # needed to create a GitHub Release and upload assets

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            runner: ubuntu-latest
            asset: cotc-linux-x64
          - target: bun-linux-arm64
            runner: ubuntu-24.04-arm
            asset: cotc-linux-arm64
          - target: bun-darwin-x64
            runner: macos-13 # Intel runner
            asset: cotc-macos-x64
          - target: bun-darwin-arm64
            runner: macos-latest # Apple Silicon runner
            asset: cotc-macos-arm64
          - target: bun-windows-x64
            runner: windows-latest
            asset: cotc-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        # Install all platform packages to avoid cross-compile resolution errors
        run: bun install --os="*" --cpu="*" --frozen-lockfile

      - name: Build binary
        run: bun run build-cli
        shell: bash

      - name: Rename Windows binary
        if: matrix.target == 'bun-windows-x64'
        run: mv dist/cli/${{ matrix.target }}/cotc dist/cli/${{ matrix.target }}/cotc.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/cli/${{ matrix.target }}/cotc*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      # Flatten the per-matrix subdirectories into a single folder with named files
      - name: Rename assets for release
        run: |
          mkdir -p final
          for dir in release-assets/*/; do
            asset_name=$(basename "$dir")
            file=$(ls "$dir" | head -1)
            ext="${file##*.}"
            if [ "$ext" = "exe" ]; then
              cp "$dir/$file" "final/${asset_name}.exe"
            else
              cp "$dir/$file" "final/${asset_name}"
            fi
          done
          ls -lh final/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: final/*
